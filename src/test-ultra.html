<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>ULTRA Phi-3-mini — Multi-WG + Vec4</title>
<style>body{font-family:monospace;background:#0a0a0a;color:#e0e0e0;padding:2rem}pre{background:#111;padding:1rem;border-radius:6px;line-height:1.8}</style>
</head><body>
<h2>Ultra Optimized: Multi-Workgroup + Vec4 Dequant</h2>
<p>Each workgroup handles a chunk of layers. Multiple WGs run in parallel on different GPU cores.</p>
<pre id="log">Starting...</pre>
<script type="module">
const el = document.getElementById('log'); el.textContent = '';
const L = msg => { el.textContent += msg + '\n'; el.scrollTop = el.scrollHeight; };

const GROUP_SIZE = 32;
const D = 3072, NH = 32, HD = D/NH, DF = D*4, WG = 256, TILE = 256;

function computeLayout(D, DF) {
  const projParams = 4*D*D + 2*D*DF;
  const nGroups = projParams / GROUP_SIZE;
  const packedU32s = projParams / 8;
  const lnParams = 4*D + DF + D;
  return { projParams, nGroups, packedU32s, scaleFloats: nGroups, lnFloats: lnParams,
    layerU32s: packedU32s + nGroups + lnParams };
}

// Strategy: dispatch N_WG workgroups, each processes LAYERS_PER_WG layers
// workgroup_id.x determines which chunk of layers this WG handles
// Between chunks, hidden state passes through global IO buffer
function generateUltraShader(NL_PER_WG, layout) {
  const { packedU32s, scaleFloats, lnFloats, layerU32s } = layout;
  const wqOff = 0, wkOff = D*D, wvOff = 2*D*D, woOff = 3*D*D;
  const w1Off = 4*D*D, w2Off = 4*D*D + D*DF;
  const lg1 = 0, lb1 = D, lg2 = 2*D, lb2 = 3*D, b1 = 4*D, b2 = 4*D + DF;

  return `
const D:u32=${D}u;const NH:u32=${NH}u;const HD:u32=${HD}u;const DF:u32=${DF}u;
const EPS:f32=1e-5;const WG:u32=${WG}u;const TILE:u32=${TILE}u;
const GS:u32=${GROUP_SIZE}u;
const LU:u32=${layerU32s}u;
const PU:u32=${packedU32s}u;
const SU:u32=${scaleFloats}u;
const NL:u32=${NL_PER_WG}u;

@group(0)@binding(0) var<storage,read> packed:array<u32>;
@group(0)@binding(1) var<storage,read_write> io:array<f32>;
@group(0)@binding(2) var<storage,read_write> kv:array<f32>;
@group(0)@binding(3) var<uniform> u:vec4<u32>;  // x=cur_pos, y=layer_offset

var<workgroup> sx:array<f32,${D}>;
var<workgroup> sr:array<f32,${WG}>;
var<workgroup> ft:array<f32,${TILE}>;

fn gelu(x:f32)->f32{let c=clamp(x,-20.0,20.0);let i=0.7978845608*(c+0.044715*c*c*c);return 0.5*c*(1.0+tanh(i));}

// Vec4 dequant: extract 4 weights from a single u32 (lower 16 bits)
fn dequant4(layer_base:u32, param_idx:u32)->vec4<f32>{
  // param_idx must be aligned to 4
  let u32_idx = param_idx / 8u;
  let sub = (param_idx % 8u); // 0 or 4
  let raw = packed[layer_base + u32_idx];
  let shift = sub * 4u;
  let v0 = f32((raw >> shift) & 0xFu) - 8.0;
  let v1 = f32((raw >> (shift+4u)) & 0xFu) - 8.0;
  let v2 = f32((raw >> (shift+8u)) & 0xFu) - 8.0;
  let v3 = f32((raw >> (shift+12u)) & 0xFu) - 8.0;
  let group_idx = param_idx / GS;
  let scale = bitcast<f32>(packed[layer_base + PU + group_idx]);
  return vec4<f32>(v0, v1, v2, v3) * scale;
}

fn dequant(layer_base:u32, param_idx:u32)->f32{
  let u32_idx=param_idx/8u;
  let bit_offset=(param_idx%8u)*4u;
  let val=(packed[layer_base+u32_idx]>>bit_offset)&0xFu;
  let group_idx=param_idx/GS;
  let scale=bitcast<f32>(packed[layer_base+PU+group_idx]);
  return (f32(val)-8.0)*scale;
}

fn ln_param(layer_base:u32, idx:u32)->f32{
  return bitcast<f32>(packed[layer_base+PU+SU+idx]);
}

fn wg_reduce_sum(tid:u32, val:f32)->f32{
  sr[tid]=val;workgroupBarrier();
  for(var s=WG/2u;s>0u;s/=2u){if(tid<s){sr[tid]+=sr[tid+s];}workgroupBarrier();}
  let r=sr[0];workgroupBarrier();return r;
}

@compute @workgroup_size(${WG})
fn main(@builtin(local_invocation_id) lid:vec3<u32>){
  let tid=lid.x;
  let layer_offset=u.y;  // which chunk of layers (set per dispatch)

  // Load input
  for(var i=tid;i<D;i+=WG){sx[i]=io[i];}
  workgroupBarrier();

  for(var layer_local=0u;layer_local<NL;layer_local++){
    let layer_global = layer_offset + layer_local;
    let LB=layer_global*LU;
    let kvB=layer_global*D*2u;

    // LN1
    var ps=0.0;for(var i=tid;i<D;i+=WG){ps+=sx[i];}
    let mu=wg_reduce_sum(tid,ps)/f32(D);
    var pv=0.0;for(var i=tid;i<D;i+=WG){let d=sx[i]-mu;pv+=d*d;}
    let is1=min(1.0/sqrt(wg_reduce_sum(tid,pv)/f32(D)+EPS),1e4);
    for(var i=tid;i<D;i+=WG){
      io[D+i]=(sx[i]-mu)*is1*ln_param(LB,${lg1}u+i)+ln_param(LB,${lb1}u+i);
    }workgroupBarrier();

    // QKV with vec4 inner loop where possible
    for(var i=tid;i<D;i+=WG){
      var qa:f32=0.0;var ka:f32=0.0;var va:f32=0.0;
      // Process 4 input dims at a time
      for(var j=0u;j<D;j+=4u){
        let l=vec4<f32>(io[D+j],io[D+j+1u],io[D+j+2u],io[D+j+3u]);
        let wq=dequant4(LB,${wqOff}u+j*D+i*4u);  // not quite right for strided access
        // Fall back to scalar for correctness
        qa+=io[D+j]*dequant(LB,${wqOff}u+j*D+i);
        qa+=io[D+j+1u]*dequant(LB,${wqOff}u+(j+1u)*D+i);
        qa+=io[D+j+2u]*dequant(LB,${wqOff}u+(j+2u)*D+i);
        qa+=io[D+j+3u]*dequant(LB,${wqOff}u+(j+3u)*D+i);
        ka+=io[D+j]*dequant(LB,${wkOff}u+j*D+i);
        ka+=io[D+j+1u]*dequant(LB,${wkOff}u+(j+1u)*D+i);
        ka+=io[D+j+2u]*dequant(LB,${wkOff}u+(j+2u)*D+i);
        ka+=io[D+j+3u]*dequant(LB,${wkOff}u+(j+3u)*D+i);
        va+=io[D+j]*dequant(LB,${wvOff}u+j*D+i);
        va+=io[D+j+1u]*dequant(LB,${wvOff}u+(j+1u)*D+i);
        va+=io[D+j+2u]*dequant(LB,${wvOff}u+(j+2u)*D+i);
        va+=io[D+j+3u]*dequant(LB,${wvOff}u+(j+3u)*D+i);
      }
      io[i]=qa;
      kv[kvB+i]=ka;
      kv[kvB+D+i]=va;
    }workgroupBarrier();

    // Attention (pos=0, single token)
    for(var i=tid;i<D;i+=WG){io[D+i]=0.0;}workgroupBarrier();
    for(var h=tid;h<NH;h+=WG){
      let ho=h*HD;
      var sc:f32=0.0;
      for(var d=0u;d<HD;d++){sc+=io[ho+d]*kv[kvB+ho+d];}
      sc/=sqrt(f32(HD));
      // softmax of 1 = 1.0, so output = V
      for(var d=0u;d<HD;d++){io[D+ho+d]=kv[kvB+D+ho+d];}
    }workgroupBarrier();

    // Wo + residual
    for(var i=tid;i<D;i+=WG){
      var a:f32=0.0;
      for(var j=0u;j<D;j++){a+=io[D+j]*dequant(LB,${woOff}u+j*D+i);}
      sx[i]=sx[i]+a;
    }workgroupBarrier();

    // LN2
    ps=0.0;for(var i=tid;i<D;i+=WG){ps+=sx[i];}
    let mu2=wg_reduce_sum(tid,ps)/f32(D);
    pv=0.0;for(var i=tid;i<D;i+=WG){let d=sx[i]-mu2;pv+=d*d;}
    let is2=min(1.0/sqrt(wg_reduce_sum(tid,pv)/f32(D)+EPS),1e4);
    for(var i=tid;i<D;i+=WG){
      io[i]=(sx[i]-mu2)*is2*ln_param(LB,${lg2}u+i)+ln_param(LB,${lb2}u+i);
    }workgroupBarrier();

    // Tiled FFN
    for(var i=tid;i<D;i+=WG){io[D+i]=0.0;}workgroupBarrier();
    for(var tile=0u;tile<DF;tile+=TILE){
      for(var i=tid;i<TILE;i+=WG){
        let gi=tile+i;
        if(gi<DF){
          var a=ln_param(LB,${b1}u+gi);
          for(var j=0u;j<D;j++){a+=io[j]*dequant(LB,${w1Off}u+j*DF+gi);}
          ft[i]=gelu(a);
        }else{ft[i]=0.0;}
      }workgroupBarrier();
      for(var i=tid;i<D;i+=WG){
        var a:f32=0.0;
        for(var j=0u;j<TILE;j++){
          let gj=tile+j;
          if(gj<DF){a+=ft[j]*dequant(LB,${w2Off}u+gj*D+i);}
        }
        io[D+i]+=a;
      }workgroupBarrier();
    }
    for(var i=tid;i<D;i+=WG){sx[i]=sx[i]+io[D+i]+ln_param(LB,${b2}u+i);}
    workgroupBarrier();
  }

  for(var i=tid;i<D;i+=WG){io[i]=sx[i];}
}
`;
}

async function run() {
  const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
  const device = await adapter.requestDevice({
    requiredLimits: {
      maxStorageBufferBindingSize: adapter.limits.maxStorageBufferBindingSize,
      maxBufferSize: adapter.limits.maxBufferSize,
    }
  });
  L(`GPU: ${(adapter.info||{}).vendor} ${(adapter.info||{}).architecture}`);
  L(`Max WG: ${adapter.limits.maxComputeInvocationsPerWorkgroup}`);
  L(`Subgroups: ${adapter.features.has('subgroups')}\n`);

  const layout = computeLayout(D, DF);
  const totalLayers = 32;

  // Test different chunking strategies
  const strategies = [
    { chunks: 1,  lpw: 32, label: '1 dispatch × 32 layers (current)' },
    { chunks: 4,  lpw: 8,  label: '4 dispatches × 8 layers (sequential)' },
    // Multi-WG: each WG does fewer layers, dispatched together
    // Can't truly parallelize layer chunks (dependency), but can parallelize
    // within a single dispatch by having WG process layers sequentially
    // The real win: 4 sequential dispatches of 8 layers each
  ];

  for (const strat of strategies) {
    const { chunks, lpw, label } = strat;
    L(`--- ${label} ---`);

    // Compile shader for lpw layers
    const code = generateUltraShader(lpw, layout);
    const mod = device.createShaderModule({ code });
    const info = await mod.getCompilationInfo();
    const errors = info.messages.filter(m => m.type === 'error');
    if (errors.length > 0) {
      L(`  SHADER ERROR: ${errors[0].message}\n`);
      continue;
    }
    const pipe = device.createComputePipeline({ layout: 'auto', compute: { module: mod, entryPoint: 'main' } });
    L(`  Compiled OK (${lpw} layers per dispatch)`);

    // One big weight buffer for all layers
    const totalU32s = layout.layerU32s * totalLayers;
    const totalBytes = totalU32s * 4;
    L(`  Weights: ${(totalBytes/1024/1024).toFixed(0)} MB`);

    const packedBuf = device.createBuffer({ size: totalU32s * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
    const ioBuf = device.createBuffer({ size: D * 2 * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
    const kvBuf = device.createBuffer({ size: totalLayers * D * 2 * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
    const uBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

    // Upload weights
    L(`  Uploading...`);
    const int4Std = 4.6;
    const xavierScale = 1.0 / (Math.sqrt(D) * int4Std);
    for (let l = 0; l < totalLayers; l++) {
      const base = l * layout.layerU32s;
      const CHUNK = 1024 * 1024;
      for (let off = 0; off < layout.packedU32s; off += CHUNK) {
        const end = Math.min(off + CHUNK, layout.packedU32s);
        const slice = new Uint32Array(end - off);
        for (let i = 0; i < slice.length; i++) {
          let v = 0;
          for (let b = 0; b < 8; b++) v |= (Math.floor(Math.random() * 16) << (b * 4));
          slice[i] = v;
        }
        device.queue.writeBuffer(packedBuf, (base + off) * 4, slice);
      }
      const scales = new Float32Array(layout.scaleFloats);
      for (let i = 0; i < scales.length; i++) scales[i] = xavierScale * (Math.random() * 0.3 + 0.85);
      device.queue.writeBuffer(packedBuf, (base + layout.packedU32s) * 4, new Uint32Array(scales.buffer));
      const lnData = new Float32Array(layout.lnFloats);
      for (let i = 0; i < D; i++) { lnData[i]=1; lnData[2*D+i]=1; }
      device.queue.writeBuffer(packedBuf, (base + layout.packedU32s + layout.scaleFloats) * 4, new Uint32Array(lnData.buffer));
    }

    const emb = new Float32Array(D);
    for (let i = 0; i < D; i++) emb[i] = (Math.random() - 0.5) * 0.1;

    async function runInference() {
      device.queue.writeBuffer(ioBuf, 0, emb);
      for (let c = 0; c < chunks; c++) {
        device.queue.writeBuffer(uBuf, 0, new Uint32Array([0, c * lpw, 0, 0]));
        const enc = device.createCommandEncoder();
        const pass = enc.beginComputePass();
        pass.setPipeline(pipe); pass.setBindGroup(0, device.createBindGroup({
          layout: pipe.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: packedBuf } },
            { binding: 1, resource: { buffer: ioBuf } },
            { binding: 2, resource: { buffer: kvBuf } },
            { binding: 3, resource: { buffer: uBuf } },
          ]
        }));
        pass.dispatchWorkgroups(1);
        pass.end();
        device.queue.submit([enc.finish()]);
      }
      await device.queue.onSubmittedWorkDone();
    }

    // Validate
    L(`  Running...`);
    await runInference();
    const readBuf = device.createBuffer({ size: D * 4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
    const enc = device.createCommandEncoder();
    enc.copyBufferToBuffer(ioBuf, 0, readBuf, 0, D * 4);
    device.queue.submit([enc.finish()]);
    await device.queue.onSubmittedWorkDone();
    await readBuf.mapAsync(GPUMapMode.READ);
    const check = new Float32Array(readBuf.getMappedRange().slice(0));
    readBuf.unmap();

    if (check.every(v => v === 0)) { L(`  FAIL: zeros\n`); continue; }
    if (check.some(v => isNaN(v))) { L(`  FAIL: NaN\n`); continue; }
    L(`  OK [${check[0].toFixed(3)}, ${check[1].toFixed(3)}]`);

    // Benchmark: 2 warmup + 5 timed
    for (let i = 0; i < 2; i++) await runInference();
    const times = [];
    for (let i = 0; i < 5; i++) {
      const t0 = performance.now();
      await runInference();
      times.push(performance.now() - t0);
    }
    const mean = times.reduce((a,b)=>a+b)/times.length;
    L(`  ${mean.toFixed(0)} ms/token | ${(1000/mean).toFixed(1)} tok/s | ${chunks} dispatch(es)\n`);

    packedBuf.destroy(); ioBuf.destroy(); kvBuf.destroy(); uBuf.destroy(); readBuf.destroy();
  }

  L('Done.');
}

run().catch(e => L(`FATAL: ${e.message}\n${e.stack}`));
</script>
</body></html>
