<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Pipelined Phi-3-mini</title>
<style>body{font-family:monospace;background:#0a0a0a;color:#e0e0e0;padding:2rem}pre{background:#111;padding:1rem;border-radius:6px;line-height:1.8}</style>
</head><body>
<h2>Pipelined: 4 Chunks in ONE Command Encoder</h2>
<p>Pre-dequant all chunks upfront. Submit 4 compute dispatches in one encoder — GPU pipelines them.</p>
<pre id="log">Starting...</pre>
<script type="module">
const el = document.getElementById('log'); el.textContent = '';
const L = msg => { el.textContent += msg + '\n'; el.scrollTop = el.scrollHeight; };

const D=3072,NH=32,HD=D/NH,DF=D*4,GS=32,TILE=256,WG=256;
const projParams=4*D*D+2*D*DF;
const packedU32s=projParams/8;
const nGroups=projParams/GS;
const lnParams=4*D+DF+D;
const wqOff=0,wkOff=D*D,wvOff=2*D*D,woOff=3*D*D,w1Off=4*D*D,w2Off=4*D*D+D*DF;
const lg1=0,lb1=D,lg2=2*D,lb2=3*D,b1=4*D,b2=4*D+DF;

const CHUNK_LAYERS = 8;
const TOTAL_LAYERS = 32;
const N_CHUNKS = TOTAL_LAYERS / CHUNK_LAYERS;

function genDequantShader(){return `
const TOTAL:u32=${projParams}u;const GS:u32=${GS}u;
@group(0)@binding(0) var<storage,read> packed:array<u32>;
@group(0)@binding(1) var<storage,read> scales:array<f32>;
@group(0)@binding(2) var<storage,read_write> out:array<f32>;
@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) gid:vec3<u32>){
  let idx=gid.x;if(idx>=TOTAL){return;}
  let val=(packed[idx/8u]>>((idx%8u)*4u))&0xFu;
  out[idx]=(f32(val)-8.0)*scales[idx/GS];
}`;}

function genComputeShader(){return `
const D:u32=${D}u;const NH:u32=${NH}u;const HD:u32=${HD}u;const DF:u32=${DF}u;
const NL:u32=${CHUNK_LAYERS}u;const EPS:f32=1e-5;const WG:u32=${WG}u;const TILE:u32=${TILE}u;
const PP:u32=${projParams}u;

@group(0)@binding(0) var<storage,read> W:array<f32>;
@group(0)@binding(1) var<storage,read> LN:array<f32>;
@group(0)@binding(2) var<storage,read_write> io:array<f32>;
@group(0)@binding(3) var<storage,read_write> kv:array<f32>;
@group(0)@binding(4) var<uniform> u:vec4<u32>;

var<workgroup> sx:array<f32,${D}>;
var<workgroup> sr:array<f32,${WG}>;
var<workgroup> ft:array<f32,${TILE}>;

fn gelu(x:f32)->f32{let c=clamp(x,-20.0,20.0);let i=0.7978845608*(c+0.044715*c*c*c);return 0.5*c*(1.0+tanh(i));}
fn wg_reduce(tid:u32,val:f32)->f32{
  sr[tid]=val;workgroupBarrier();
  for(var s=WG/2u;s>0u;s/=2u){if(tid<s){sr[tid]+=sr[tid+s];}workgroupBarrier();}
  let r=sr[0];workgroupBarrier();return r;
}

@compute @workgroup_size(${WG})
fn main(@builtin(local_invocation_id) lid:vec3<u32>){
  let tid=lid.x;
  for(var i=tid;i<D;i+=WG){sx[i]=io[i];}workgroupBarrier();
  for(var ll=0u;ll<NL;ll++){
    let WB=ll*PP;let LB=ll*${lnParams}u;let kvB=ll*D*2u;
    var ps=0.0;for(var i=tid;i<D;i+=WG){ps+=sx[i];}
    let mu=wg_reduce(tid,ps)/f32(D);
    var pv=0.0;for(var i=tid;i<D;i+=WG){let d=sx[i]-mu;pv+=d*d;}
    let is1=min(1.0/sqrt(wg_reduce(tid,pv)/f32(D)+EPS),1e4);
    for(var i=tid;i<D;i+=WG){io[D+i]=(sx[i]-mu)*is1*LN[LB+${lg1}u+i]+LN[LB+${lb1}u+i];}workgroupBarrier();
    for(var i=tid;i<D;i+=WG){
      var qa:f32=0.0;var ka:f32=0.0;var va:f32=0.0;
      for(var j=0u;j<D;j++){let l=io[D+j];qa+=l*W[WB+${wqOff}u+j*D+i];ka+=l*W[WB+${wkOff}u+j*D+i];va+=l*W[WB+${wvOff}u+j*D+i];}
      io[i]=qa;kv[kvB+i]=ka;kv[kvB+D+i]=va;
    }workgroupBarrier();
    for(var i=tid;i<D;i+=WG){io[D+i]=kv[kvB+D+i];}workgroupBarrier();
    for(var i=tid;i<D;i+=WG){var a:f32=0.0;for(var j=0u;j<D;j++){a+=io[D+j]*W[WB+${woOff}u+j*D+i];}sx[i]+=a;}workgroupBarrier();
    ps=0.0;for(var i=tid;i<D;i+=WG){ps+=sx[i];}
    let mu2=wg_reduce(tid,ps)/f32(D);
    pv=0.0;for(var i=tid;i<D;i+=WG){let d=sx[i]-mu2;pv+=d*d;}
    let is2=min(1.0/sqrt(wg_reduce(tid,pv)/f32(D)+EPS),1e4);
    for(var i=tid;i<D;i+=WG){io[i]=(sx[i]-mu2)*is2*LN[LB+${lg2}u+i]+LN[LB+${lb2}u+i];}workgroupBarrier();
    for(var i=tid;i<D;i+=WG){io[D+i]=0.0;}workgroupBarrier();
    for(var tile=0u;tile<DF;tile+=TILE){
      for(var i=tid;i<TILE;i+=WG){let gi=tile+i;if(gi<DF){var a=LN[LB+${b1}u+gi];for(var j=0u;j<D;j++){a+=io[j]*W[WB+${w1Off}u+j*DF+gi];}ft[i]=gelu(a);}else{ft[i]=0.0;}}workgroupBarrier();
      for(var i=tid;i<D;i+=WG){var a:f32=0.0;for(var j=0u;j<TILE;j++){let gj=tile+j;if(gj<DF){a+=ft[j]*W[WB+${w2Off}u+gj*D+i];}}io[D+i]+=a;}workgroupBarrier();
    }
    for(var i=tid;i<D;i+=WG){sx[i]+=io[D+i]+LN[LB+${b2}u+i];}workgroupBarrier();
  }
  for(var i=tid;i<D;i+=WG){io[i]=sx[i];}
}`;}

async function run() {
  const adapter = await navigator.gpu.requestAdapter({powerPreference:'high-performance'});
  const device = await adapter.requestDevice({requiredLimits:{
    maxStorageBufferBindingSize:adapter.limits.maxStorageBufferBindingSize,
    maxBufferSize:adapter.limits.maxBufferSize,
  }});
  L(`GPU: ${(adapter.info||{}).vendor} ${(adapter.info||{}).architecture}\n`);

  const dqPipe=device.createComputePipeline({layout:'auto',compute:{module:device.createShaderModule({code:genDequantShader()}),entryPoint:'main'}});
  const cPipe=device.createComputePipeline({layout:'auto',compute:{module:device.createShaderModule({code:genComputeShader()}),entryPoint:'main'}});
  const xavierScale=1.0/(Math.sqrt(D)*4.6);

  // Pre-allocate EVERYTHING upfront — no allocation during inference
  L('Allocating buffers...');

  // Per-chunk: dequantized weight buffer + LN buffer + KV buffer
  // All pre-allocated, pre-filled, bind groups pre-created
  const ioBuf = device.createBuffer({size:D*2*4, usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_SRC|GPUBufferUsage.COPY_DST});

  const chunks = [];
  for (let c = 0; c < N_CHUNKS; c++) {
    const dqSize = projParams * CHUNK_LAYERS;
    const dqBuf = device.createBuffer({size:dqSize*4, usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
    const lnBuf = device.createBuffer({size:lnParams*CHUNK_LAYERS*4, usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
    const kvBuf = device.createBuffer({size:CHUNK_LAYERS*D*2*4, usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
    const uBuf = device.createBuffer({size:16, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
    device.queue.writeBuffer(uBuf, 0, new Uint32Array([0,0,0,0]));

    // Upload + dequant weights
    for (let l = 0; l < CHUNK_LAYERS; l++) {
      const pBuf=device.createBuffer({size:packedU32s*4,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
      const sBuf=device.createBuffer({size:nGroups*4,usage:GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST});
      const CHUNK=1024*1024;
      for(let off=0;off<packedU32s;off+=CHUNK){const end=Math.min(off+CHUNK,packedU32s);const sl=new Uint32Array(end-off);for(let i=0;i<sl.length;i++){let v=0;for(let b=0;b<8;b++)v|=(Math.floor(Math.random()*16)<<(b*4));sl[i]=v;}device.queue.writeBuffer(pBuf,off*4,sl);}
      const sc=new Float32Array(nGroups);for(let i=0;i<sc.length;i++)sc[i]=xavierScale*(Math.random()*0.3+0.85);
      device.queue.writeBuffer(sBuf,0,new Uint32Array(sc.buffer));
      const ln=new Float32Array(lnParams);for(let i=0;i<D;i++){ln[i]=1;ln[2*D+i]=1;}
      device.queue.writeBuffer(lnBuf,l*lnParams*4,new Uint32Array(ln.buffer));

      const bg=device.createBindGroup({layout:dqPipe.getBindGroupLayout(0),entries:[
        {binding:0,resource:{buffer:pBuf}},{binding:1,resource:{buffer:sBuf}},
        {binding:2,resource:{buffer:dqBuf,offset:l*projParams*4,size:projParams*4}},
      ]});
      const enc=device.createCommandEncoder();const pass=enc.beginComputePass();
      pass.setPipeline(dqPipe);pass.setBindGroup(0,bg);pass.dispatchWorkgroups(Math.ceil(projParams/256));
      pass.end();device.queue.submit([enc.finish()]);
      pBuf.destroy();sBuf.destroy();
    }

    // Pre-create bind group for compute
    const cBG = device.createBindGroup({layout:cPipe.getBindGroupLayout(0),entries:[
      {binding:0,resource:{buffer:dqBuf}},{binding:1,resource:{buffer:lnBuf}},
      {binding:2,resource:{buffer:ioBuf}},{binding:3,resource:{buffer:kvBuf}},
      {binding:4,resource:{buffer:uBuf}},
    ]});

    chunks.push({ dqBuf, lnBuf, kvBuf, uBuf, cBG });
    L(`  Chunk ${c}: layers ${c*CHUNK_LAYERS}-${(c+1)*CHUNK_LAYERS-1} ready`);
  }
  await device.queue.onSubmittedWorkDone();
  L('All chunks pre-allocated and pre-dequantized.\n');

  const emb = new Float32Array(D);
  for(let i=0;i<D;i++) emb[i]=(Math.random()-0.5)*0.1;

  // Force GPU sync by reading back 4 bytes with a fresh buffer each time
  async function gpuSync() {
    const tmp = device.createBuffer({size:4, usage:GPUBufferUsage.MAP_READ|GPUBufferUsage.COPY_DST});
    const enc = device.createCommandEncoder();
    enc.copyBufferToBuffer(ioBuf, 0, tmp, 0, 4);
    device.queue.submit([enc.finish()]);
    await tmp.mapAsync(GPUMapMode.READ);
    new Float32Array(tmp.getMappedRange().slice(0)); // force actual read
    tmp.unmap();
    tmp.destroy();
  }

  // === TEST 1: Sequential (await between chunks) — our current approach ===
  async function runSequential() {
    device.queue.writeBuffer(ioBuf, 0, emb);
    for (let c = 0; c < N_CHUNKS; c++) {
      const enc = device.createCommandEncoder();
      const pass = enc.beginComputePass();
      pass.setPipeline(cPipe);
      pass.setBindGroup(0, chunks[c].cBG);
      pass.dispatchWorkgroups(1);
      pass.end();
      device.queue.submit([enc.finish()]);
      await device.queue.onSubmittedWorkDone();  // WAIT between chunks
    }
  }

  // === TEST 2: Pipelined (all chunks in ONE encoder, no await between) ===
  async function runPipelined() {
    device.queue.writeBuffer(ioBuf, 0, emb);
    const enc = device.createCommandEncoder();
    for (let c = 0; c < N_CHUNKS; c++) {
      const pass = enc.beginComputePass();
      pass.setPipeline(cPipe);
      pass.setBindGroup(0, chunks[c].cBG);
      pass.dispatchWorkgroups(1);
      pass.end();
    }
    device.queue.submit([enc.finish()]);
    await device.queue.onSubmittedWorkDone();  // ONE await at the end
  }

  // === TEST 3: Batch submit (separate encoders, all submitted before await) ===
  async function runBatchSubmit() {
    device.queue.writeBuffer(ioBuf, 0, emb);
    for (let c = 0; c < N_CHUNKS; c++) {
      const enc = device.createCommandEncoder();
      const pass = enc.beginComputePass();
      pass.setPipeline(cPipe);
      pass.setBindGroup(0, chunks[c].cBG);
      pass.dispatchWorkgroups(1);
      pass.end();
      device.queue.submit([enc.finish()]);  // Submit without await
    }
    await device.queue.onSubmittedWorkDone();  // ONE await at the end
  }

  // Validate all three
  for (const [name, fn] of [['sequential', runSequential], ['pipelined', runPipelined], ['batch', runBatchSubmit]]) {
    await fn();
    const readBuf=device.createBuffer({size:D*4,usage:GPUBufferUsage.MAP_READ|GPUBufferUsage.COPY_DST});
    const rEnc=device.createCommandEncoder();rEnc.copyBufferToBuffer(ioBuf,0,readBuf,0,D*4);
    device.queue.submit([rEnc.finish()]);await device.queue.onSubmittedWorkDone();
    await readBuf.mapAsync(GPUMapMode.READ);
    const c=new Float32Array(readBuf.getMappedRange().slice(0));readBuf.unmap();readBuf.destroy();
    if(c.every(v=>v===0)){L(`${name}: FAIL zeros`);continue;}
    if(c.some(v=>isNaN(v))){L(`${name}: FAIL NaN`);continue;}
    L(`${name}: OK [${c[0].toFixed(4)}, ${c[1].toFixed(4)}]`);
  }
  L('');

  // Benchmark all three
  const approaches = [
    { name: 'Sequential (await per chunk)', fn: runSequential },
    { name: 'Pipelined (1 encoder, 4 passes)', fn: runPipelined },
    { name: 'Batch submit (4 submits, 1 await)', fn: runBatchSubmit },
  ];

  for (const { name, fn } of approaches) {
    L(`--- ${name} ---`);
    // Warmup
    for(let i=0;i<3;i++){ await fn(); await gpuSync(); }
    // Timed — gpuSync forces real GPU completion
    const times=[];
    for(let i=0;i<5;i++){
      const t0=performance.now();
      await fn();
      await gpuSync();
      times.push(performance.now()-t0);
    }
    const mean=times.reduce((a,b)=>a+b)/times.length;
    L(`  ${mean.toFixed(0)} ms/token | ${(1000/mean).toFixed(1)} tok/s\n`);
  }

  L('Done. Previous best: 449ms (chunked pre-dequant with per-chunk await)');
}
run().catch(e=>L(`FATAL: ${e.message}\n${e.stack}`));
</script>
</body></html>
